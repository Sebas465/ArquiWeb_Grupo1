spring.application.name=apikitchen
# Conexión a PostgreSQL

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/kitchenhack
spring.datasource.username=postgres
spring.datasource.password=postgre

# JPA
spring.jpa.database=postgresql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Puerto
server.port=8080

# URL base de la API externa para ingredientes (se usa en US12). Valor por defecto es placeholder.
external.ingredientes.api=https://api.ingredientes.example/v1/ingrediente
