spring.application.name=apikitchen

# Conexión a PostgreSQL — las variables de entorno las provee Render (o local por defecto)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/kitchenhack}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgre}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Puerto — Render inyecta PORT automáticamente
server.port=${PORT:8085}
